<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>プレイヤーログイン - Match Point</title>
<link th:href="@{/webjars/bootstrap/4.5.2/css/bootstrap.min.css}" rel="stylesheet">
<link href="/css/shoma.css" rel="stylesheet">
</head>
<body class="bg-img">

	<nav class="navbar navbar-expand-sm navbar-dark sticky-top" style="background: linear-gradient(90deg, #0D47A1, #1565C0); box-shadow: 0 2px 8px rgba(13,71,161,0.4);">
		<button class="navbar-toggler" type="button" data-toggle="collapse"
			data-target="#navbarNav4" aria-controls="navbarNav4"
			aria-expanded="false" aria-label="Toggle navigation">
			<span class="navbar-toggler-icon"></span>
		</button>
		<a href="/" class="navbar-brand">Match Point</a>
		<div class="collapse navbar-collapse justify-content-end">
			<ul class="navbar-nav">
				<li class="nav-item">
					<button type="button" onclick="location.href='/'" name="create"
						class="btn btn-primary">戻る</button>
				</li>
			</ul>
		</div>
	</nav>

	<div class="complogin_form">
		<div class="text-center" style="padding-top: 24px;">
			<div style="font-size: 2.5rem; color: #2E7D32;">&#9654;</div>
			<h4 style="color: #1B5E20; font-weight: bold; margin: 8px 0 4px;">プレイヤーモード</h4>
			<p style="color: #555; font-size: 0.9rem; margin-bottom: 0;">大会ログインIDを入力してください</p>
		</div>

		<div class="text-center" style="color: #C62828; font-size: 0.9rem; min-height: 1.2em; padding: 4px 0;">
			<span th:text="${errorMsg}"></span>
		</div>

		<div class="middlecomplogin">
			<form action="tournament_player" method="POST" style="width: 100%; padding: 0 16px;">
				<div class="form-group text-center">
					<label class="w-auto d-block mb-1" style="font-size: 0.9rem; color: #555; text-align: left;">大会ログインID</label>
					<input type="text" name="compLoginId" class="base_input"
						placeholder="IDを入力" style="width: 100%; max-width: 280px;" autofocus>
				</div>
				<div class="text-center mt-3" style="padding-bottom: 24px;">
					<input type="submit" value="ログイン" class="btn btn-success"
						style="min-width: 160px; font-size: 1rem; padding: 10px; background: linear-gradient(135deg, #43A047, #2E7D32); border: none;">
				</div>
			</form>
		</div>
	</div>

</body>
</html>
